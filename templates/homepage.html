{% extends "layout.html" %}
{% block body %}

  {% for cluster in lista_cluster %}
      <form action="{{ url_for('homepage') }}" method=post>
        <div class="card m-3" style="width: 18rem;">
          <ul class="list-group list-group-flush">
            <li class="list-group-item active" aria-current="true">{{ cluster.name }}</li>
            {% for equipamento in cluster.equipamentos %}
            <li class="list-group-item">{{ equipamento.hostname }}</li>
            <a class="btn btn-primary" href="{{ url_for('equipamento', equipName=equipamento.hostname) }}" role="button">Editar</a>
            {% endfor %}
          </ul>
          <button type="submit" class="btn btn-primary" name="desativar" value="{{ cluster.name }}">Desativar</button>
          <a class="btn btn-primary" href="{{ url_for('cluster', clusterName=cluster.name) }}" role="button">Editar</a>
        </div>
      </form>
    {% endfor %}

{% endblock %}
