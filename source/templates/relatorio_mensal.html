{% extends "layout.html" %} 
{% block body %}
<div class="cadastro">

    <h2 class="mb-4">Relatório Mensal</h2>

    <form method="POST">
        <div class="row g-3 mb-4 align-items-end">
            <div class="col-md-2">
                <label for="ano" class="form-label fw-bold">Ano</label>
                <input type="number" class="form-control" id="ano" name="ano" value="{{ ano }}" min="2000" max="2100" required>
            </div>
            <div class="col-md-2">
                <label for="mes" class="form-label fw-bold">Mês</label>
                <select class="form-select" id="mes" name="mes" required>
                    {% for m in range(1, 13) %}
                    <option value="{{ m }}" {% if m == mes %}selected{% endif %}>{{ m }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Projeto</th>
                        <th scope="col">Serviço</th>
                        <th scope="col">Storage Cluster</th>
                        <th scope="col">Storage 24x7</th>
                        <th scope="col">Máquina Cluster</th>
                        <th scope="col">Máquina 24x7</th>
                    </tr>
                </thead>
                <tbody>
                    {% for grupo in grupos %}
                    {% set rel = relatorios.get((grupo.nome, ano, mes)) %}
                    <tr>
                        <td>{{ grupo.nome }}</td>
                        <td><input type="text" name="servico_{{ grupo.id }}" value="{{ rel.servico if rel else '' }}" class="form-control form-control-sm"></td>
                        <td><input type="number" step="0.01" name="storage_cluster_{{ grupo.id }}" value="{{ rel.storage_cluster if rel else '' }}" class="form-control form-control-sm"></td>
                        <td><input type="number" step="0.01" name="storage_24x7_{{ grupo.id }}" value="{{ rel.storage_24x7 if rel else '' }}" class="form-control form-control-sm"></td>
                        <td><input type="number" step="0.01" name="maquina_cluster_{{ grupo.id }}" value="{{ rel.maquina_cluster if rel else '' }}" class="form-control form-control-sm"></td>
                        <td><input type="number" step="0.01" name="maquina_24x7_{{ grupo.id }}" value="{{ rel.maquina_24x7 if rel else '' }}" class="form-control form-control-sm"></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="text-end mt-3">
            <button type="submit" class="btn btn-success px-4">Salvar</button>
        </div>
    </form>

</div>
{% endblock %}
