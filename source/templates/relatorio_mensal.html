{% extends "layout.html" %} 
{% block body %}
<div class="cadastro">

    <h2 class="mb-4">Relatório Mensal</h2>

    <form method="POST" enctype="multipart/form-data">
    <div class="row mb-3">
        <div class="col-md-2">
            <label for="ano" class="form-label">Ano</label>
            <input type="number" class="form-control" id="ano" name="ano" value="{{ ano }}" required>
        </div>
        <div class="col-md-2">
            <label for="mes" class="form-label">Mês</label>
            <select class="form-select" id="mes" name="mes" required>
                {% for m in range(1, 13) %}
                    <option value="{{ m }}" {% if m == mes %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label for="xlsx_file" class="form-label">Importar Relatório (.xlsx)</label>
            <input type="file" class="form-control" id="xlsx_file" name="xlsx_file" accept=".xlsx" required>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary">Importar</button>
        </div>
    </div>
</form>

</div>
{% endblock %}
