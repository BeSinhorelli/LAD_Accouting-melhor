{% extends "layout.html" %} {% block body %}

<div class="cadastro">

    <!--  TÍTULO  -->
    {% if grupo %}
    <h2>Editar {{ grupo.nome }}</h2>
    {% else %}
    <h2>Cadastrar Grupo</h2>
    {% endif %}

    <!--  FORMULÁRIO  -->
    <form
        action="{% if grupo %} {{ url_for('grupo', groupName=grupo.nome) }} {% else %} {{ url_for('grupo', groupName='cadastro') }} {% endif %}"
        method=post enctype="multipart/form-data">
        <div class="mb-3">
            <!--  STATUS  -->
            {% if grupo %}
            <label class="form-label">Status</label>
            <select class="mb-3 form-select" aria-label="Default select example" name="status">
                <option value="ativar" {% if grupo.status %}selected {% endif %}>Ativo</option>
                <option value="desativar" {% if not grupo.status %}selected {% endif %}>Inativo</option>
            </select>
            {% endif %}

            <!--  NOME  -->
            <label class="form-label">Nome</label>
            <input type="text" class="mb-3 form-control" name=nome value="{% if grupo %}{{ grupo.nome }}{% endif %}"
                required placeholder="Para separar nomes, use o traço (-) em vez da barra (/)">

            <!--  DEMANDA  -->
            <label class="form-label">Demanda</label>
            <input type="text" class="mb-3 form-control" name=demanda
                value="{% if grupo %}{{ grupo.demanda }}{% endif %}">

            <!--  UNIDADE  -->
            <label class="form-label">Unidade</label>
            <input type="text" class="mb-3 form-control" name=unidade
                value="{% if grupo %}{{ grupo.unidade }}{% endif %}">
            <datalist id="unidades">
                {% for grupo in lista_grupos %}
                <option value="{{ grupo.unidade }}">
                    {% endfor %}
            </datalist>

            <!--  COORDENADOR  -->
            <label class="form-label">Coordenador</label>
            <input type="text" class="mb-3 form-control" name=coordenador
                value="{% if grupo %}{{ grupo.coordenador }}{% endif %}">

            <!--  OBSERVAÇÕES  -->
            <label class="form-label">Observações</label>
            <textarea class="mb-3 form-control" id="exampleFormControlTextarea1" name=observacoes
                rows="3">{% if grupo %}{{ grupo.observacoes }}{% endif %}</textarea>

            <!--  TIPO  -->
            <label class="form-label">Tipo</label>
            <input type="text" class="mb-3 form-control" name=tipo id="tipo_text_input" value="{% if grupo %}{{ grupo.tipo }}{% endif %}"> 
            <div class="mb-3">
                <div class="form-check form-check-inline" style="color: white;">
                    <input class="form-check-input" type="radio" name="tipo" id="tipoDisciplina" value="Disciplina" {%
                        if grupo and grupo.tipo.lower()=='disciplina' %}{% endif %}>
                    <label class="form-check-label" for="tipoDisciplina">Disciplina</label>
                </div>
            </div>

            <div id="campos-disciplina" class="{% if grupo and grupo.tipo.lower() == 'disciplina' %}d-block{% else %}d-none{% endif %}"><label class="form-label">Número de Contas:</label>
                <input type="number" class="mb-3 form-control" name="intervalo_final_conta" value="" min="0" placeholder="Número de contas para a disciplina">
            </div>

            <!--  LOGOTIPO  -->
            <label class="form-label">Enviar logotipo (.png)</label>
            <input type="file" class="mb-3 form-control" name="logotipo" accept=".png">
        </div>

        <!--  SUBMIT  -->
        <button type="submit" class="btn btn-primary">Cadastrar</button>
        {% if msg %}
        <label class="btn btn-outline-warning" for="floatingInputInvalid">{{ msg }}!</label>
        {% endif %}
    </form>
    <!--  EXCLUIR DO DB  -->
    {% if grupo %}
    <div style="display: flex; width: 100%; justify-content: end;">
        <form action="{{ url_for('grupo_delete', groupName=grupo.nome) }}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-danger"
                onclick="return confirm('Tem certeza que deseja excluir o grupo {{ grupo.nome }}?')">
                Excluir grupo
            </button>
        </form>
    </div>
    {% endif %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tipoDisciplina = document.getElementById('tipoDisciplina'); 
        const camposDisciplina = document.getElementById('campos-disciplina');
        const inputNumContas = document.querySelector('input[name="intervalo_final_conta"]');

        function toggleCamposDisciplina() {
            if (tipoDisciplina.checked) {
                camposDisciplina.classList.remove('d-none');
                camposDisciplina.classList.add('d-block');
                inputNumContas.required = true;
            } else {
                camposDisciplina.classList.remove('d-block');
                camposDisciplina.classList.add('d-none');
                inputNumContas.required = false;
            }
        }
        tipoDisciplina.addEventListener('change', toggleCamposDisciplina);
        toggleCamposDisciplina();
    });
</script>
{% endblock %}
