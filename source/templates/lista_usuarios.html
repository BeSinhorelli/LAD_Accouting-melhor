{% extends "layout.html" %} 
{% block body %}
<div class="cadastro">
    <h2>Usuários do grupo {{ grupo.nome }}</h2>
    <ul class="list-group">
        {% for usuario in usuarios %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ usuario.nome }} -
            {{usuario.email}}
            <a class="btn btn-primary btn-sm" href="{{ url_for('usuario', userName=usuario.nome) }}">Editar</a>
        </li>
        {% else %}
        <li class="list-group-item">Nenhum usuário cadastrado neste grupo.</li>
        {% endfor %}
    </ul>
    <a class="btn btn-secondary mt-3" href="{{ url_for('homepage') }}">Voltar</a>
</div>
{% endblock %}
